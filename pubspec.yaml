name: frameon
description: "A smart LED matrix display companion app for Spotify, GIF display, clock, and Pomodoro timer."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  gap: ^3.0.1

  # HTTP client (ESP32 REST API + Spotify API)
  http: ^1.6.0

  # WebSocket (live state updates from ESP32)
  web_socket_channel: ^3.0.3

  # Web platform JS interop — required by web_serial_service.dart
  # dart:js_interop and package:web/web.dart both need this as a direct dep
  web: ^1.1.1

  # Secure token storage (Spotify OAuth tokens)
  flutter_secure_storage: ^10.0.0

  # State management
  flutter_riverpod: ^3.2.1

  # Image processing (resize, dither, RGB565 encoding)
  image: ^4.8.0

  # Unique IDs
  uuid: ^4.5.3

  # URL launcher (Spotify OAuth redirect)
  url_launcher: ^6.3.0

  # App links / deep linking (OAuth callback)
  app_links: ^7.0.0

  # Local file storage (GIF/image assets)
  path_provider: ^2.1.5

  # File picking (GIF/image upload from device)
  file_picker: ^10.3.10

  # Persistent settings (brightness, last IP, mode)
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
