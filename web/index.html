<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Frameon — ESP32 LED Panel Control Center">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Frameon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>Frameon</title>

  <style>
    body {
      background-color: #0A0C0F;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      color: #00E5A0;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
    }
    #loading .dot-ring {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(0, 229, 160, 0.12);
      border-top-color: #00E5A0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot-ring"></div>
    <span>almost there</span>
  </div>

  <!-- Web Serial bridge — must load BEFORE Flutter boots -->
  <script src="serial_interops.js"></script>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
